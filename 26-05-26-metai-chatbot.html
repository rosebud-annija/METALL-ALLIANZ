<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METAi – Die Stimme der Metall Allianz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #ffffff;
      --surface:     #ffffff;
      --surface2:    #f4f5f4;
      --surface3:    #eaeaea;
      --border:      #e0e0e0;
      --accent:      #79FFE1;
      --accent-ink:  #007d65;
      --text:        #111111;
      --text-dim:    #777777;
      --user-bubble: #111111;
      --bot-bubble:  #f4f5f4;
      --radius:      12px;
      --font:        'Futura', 'Outfit', 'Century Gothic', 'Trebuchet MS', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      border-bottom: 2px solid var(--text);
      background: var(--surface);
      flex-shrink: 0;
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 28px;
      max-width: 780px;
      margin: 0 auto;
    }

    .header-text { flex: 1; }
    .header-title {
      font-size: 50px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1.0;
      text-transform: uppercase;
    }
    .header-sub {
      font-size: 23px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 600;
      line-height: 1.1;
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
      background: var(--bg);
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── SPLASH / FACT CARD ── */
    .splash-card {
      background: var(--surface2);
      border: 2px solid var(--text);
      border-left: 5px solid var(--accent);
      border-radius: var(--radius);
      padding: 22px 22px 18px;
      margin-bottom: 10px;
      animation: fadeSlide .5s ease;
    }

    .splash-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent-ink);
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .splash-label::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }

    .splash-question {
      font-size: 19px;
      font-weight: 900;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .splash-teaser {
      font-size: 13.5px;
      color: var(--text-dim);
      line-height: 1.55;
    }

    .splash-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
    }

    .splash-dots {
      display: flex;
      gap: 5px;
    }

    .splash-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background .2s, transform .2s;
      border: 1px solid #ccc;
    }

    .splash-dot.active {
      background: var(--text);
      border-color: var(--text);
      transform: scale(1.2);
    }

    .splash-skip {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid var(--text);
      background: var(--accent);
      color: var(--text);
      font-family: var(--font);
      transition: all .15s;
    }

    .splash-skip:hover {
      background: var(--text);
      color: var(--accent);
    }

    /* ── MESSAGES ── */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeSlide .3s ease;
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .bubble {
      max-width: 82%;
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1.5px solid var(--border);
      color: var(--text);
      border-top-left-radius: 3px;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1.5px solid var(--text);
      color: #ffffff;
      border-top-right-radius: 3px;
    }

    .bubble strong {
      color: var(--text);
      font-weight: 700;
    }

    .bubble em {
      color: var(--accent-ink);
      font-style: normal;
      font-weight: 600;
    }

    .bubble ul {
      margin: 8px 0 4px 16px;
      color: var(--text);
    }

    .bubble ul li {
      margin-bottom: 4px;
    }

    .bubble .hält {
      display: inline-block;
      margin-top: 12px;
      font-weight: 900;
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--accent);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .timestamp {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 5px;
      padding: 0 4px;
      letter-spacing: 0.04em;
    }

    .message.user .timestamp { text-align: right; }

    /* ── TYPING INDICATOR ── */
    .typing-indicator {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeSlide .3s ease;
    }

    .typing-dots {
      background: var(--bot-bubble);
      border: 1.5px solid var(--border);
      border-top-left-radius: 3px;
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: .3;
    }

    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .25; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── INPUT ── */
    .input-area {
      background: var(--surface);
      border-top: 2px solid var(--text);
      flex-shrink: 0;
    }

    .input-inner {
      padding: 14px 24px 20px;
      max-width: 780px;
      margin: 0 auto;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px 16px;
      resize: none;
      max-height: 120px;
      min-height: 46px;
      outline: none;
      line-height: 1.5;
      transition: border-color .15s;
    }

    .input-field:focus {
      border-color: var(--text);
      background: #fff;
    }

    .input-field::placeholder { color: #aaa; }

    .send-btn {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: var(--accent);
      border: 1.5px solid var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }

    .send-btn:hover { background: var(--text); }
    .send-btn:hover svg { fill: var(--accent); }
    .send-btn:active { transform: scale(.95); }
    .send-btn:disabled { opacity: .35; cursor: default; }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--text);
      transition: fill .15s;
    }

    .footer-note {
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .footer-note strong {
      color: var(--text);
    }

    /* ── SECTION DIVIDER ── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── SUGGESTION CHIPS ── */
    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0 8px 0;
      animation: fadeSlide .35s ease;
    }

    .chip {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--text);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-family: var(--font);
      transition: background .15s, color .15s;
      line-height: 1;
    }

    .chip:hover {
      background: var(--accent);
      border-color: var(--text);
    }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- HEADER -->
  <header class="header">

    triggers: ["hallo", "hi", "guten", "guten tag", "servus", "grüß", "hey", "start", "wer bist"],
    answer: `<strong>Servus! Ich bin METAi.</strong>

Die Stimme der Metall Allianz. Ich bin hier, um Fragen über Metall zu beantworten — von Klimaschutz und Kreislaufwirtschaft bis zu Jobperspektiven und Innovation.

Stell mir eine Frage über Metall, Klimaschutz, Kreislaufwirtschaft oder die Branche.`,
    chips: ["Klimaschutz & Metall?", "Jobs in der Branche?", "Metall & Energiewende?"]
  },
  {
    triggers: ["danke", "super", "toll", "prima", "gut", "vielen dank", "interessant", "wusste ich nicht"],
    answer: `Freut mich! Metall hat noch viel mehr zu erzählen.

Frag mich weiter — ich bin nicht so schnell fertig.`,
    chips: ["Was ist Green Steel?", "Kreislaufwirtschaft?", "Jobs in der Branche?"]
  },
  {
    triggers: ["brücke", "gebäude", "architektur", "hochhaus", "konstruktion", "tragwerk"],
    answer: `<strong>Metall trägt.</strong>

Im wahrsten Sinne. Jede Brücke. Jede Fassade. Jedes Hochhaus. Stahl und Aluminium sind die unsichtbaren Helden der Architektur.

Das Burj Khalifa? Stahl. Die Golden Gate Bridge? Stahl. Die Glashülle des Louvre-Eingangs? Aluminium.

Metall hält — auch im Grenzbereich. `,
    chips: ["Einzelne Metalle?", "Metall in Österreich?", "Kreislaufwirtschaft?"]
  },
  {
    triggers: ["auto", "mobilität", "e-auto", "elektro", "fahrzeug", "transport", "lkw", "zug"],
    answer: `<strong>Metall bewegt.</strong>

Kein Auto ohne Karosserie aus Stahl und Aluminium. Kein Zug ohne Gleise. Kein E-Motor ohne Kupfer und seltene Erden.

Die Mobilitätswende braucht mehr Metall, nicht weniger. Leichtere Bauteile aus Aluminium. Hochfester Stahl für Sicherheitszellen. Batteriegehäuse aus Speziallegierungen.

Metall hält Schritt. `,
    chips: ["Metall & Energiewende?", "Einzelne Metalle?", "Was ist Green Steel?"]
  },
];

const FALLBACK = `Das ist eine gute Frage — und ich bin noch im Aufbau meiner Antworten.

Was ich sagen kann: <strong>Metall hält.</strong> In jeder Situation. Was genau du wissen willst, kannst du mir gerne nochmal mit anderen Worten schreiben.`;

const FALLBACK_CHIPS = ["Klimaschutz & Metall?", "Was ist Green Steel?", "Jobs in der Branche?", "Kreislaufwirtschaft?"];

// ─────────────────────────────────────────────
// CORE FUNCTIONS
// ─────────────────────────────────────────────

function getAnswerWithChips(query) {
  const q = query.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
  for (const entry of KB) {
    for (const t of entry.triggers) {
      const norm = t.normalize("NFD").replace(/[̀-ͯ]/g, "");
      if (q.includes(norm)) return { answer: entry.answer, chips: entry.chips || [] };
    }
  }
  return { answer: FALLBACK, chips: FALLBACK_CHIPS };
}

function addChips(chipsArr) {
  if (!chipsArr || !chipsArr.length) return;
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'chips-row';
  chipsArr.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = label;
    btn.onclick = () => { row.remove(); sendMessage(label); };
    row.appendChild(btn);
  });
  msgs.appendChild(row);
  scrollBottom();
}

function now() {
  return new Date().toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit' });
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function addMessage(html, role) {
  const msgs = document.getElementById('messages');

  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const bubbleEl = document.createElement('div');
  bubbleEl.className = 'bubble';
  bubbleEl.innerHTML = html;

  const tsEl = document.createElement('div');
  tsEl.className = 'timestamp';
  tsEl.textContent = now();

  const inner = document.createElement('div');
  inner.appendChild(bubbleEl);
  inner.appendChild(tsEl);
  wrap.appendChild(inner);

  msgs.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'typing-indicator';
  el.id = 'typing';
  el.innerHTML = `
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>`;
  msgs.appendChild(el);
  scrollBottom();
  return el;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function handleSend() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);
  sendMessage(text);
}

function sendChip(btn) {
  sendMessage(btn.textContent.trim());
}

async function sendMessage(text) {
  const splash = document.getElementById('splashCard');
  if (splash) splash.remove();

  // Remove existing chips before new exchange
  document.querySelectorAll('.chips-row').forEach(el => el.remove());

  addMessage(text, 'user');

  const typing = showTyping();
  document.getElementById('sendBtn').disabled = true;

  await delay(600 + Math.random() * 700);

  removeTyping();
  document.getElementById('sendBtn').disabled = false;

  const { answer, chips } = getAnswerWithChips(text);
  addMessage(answer, 'bot');
  addChips(chips);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─────────────────────────────────────────────
// SPLASH CARD
// ─────────────────────────────────────────────

function renderSplash(index) {
  const fact = SPLASH_FACTS[index];
  const msgs = document.getElementById('messages');

  let existing = document.getElementById('splashCard');
  if (existing) existing.remove();

  const card = document.createElement('div');
  card.className = 'splash-card';
  card.id = 'splashCard';

  const dotsHTML = SPLASH_FACTS.map((_, i) =>
    `<span class="splash-dot ${i === index ? 'active' : ''}" onclick="goToSplash(${i})"></span>`
  ).join('');

  card.innerHTML = `
    <div class="splash-label">Wusstest du?</div>
    <div class="splash-question">${fact.question}</div>
    <div class="splash-teaser">${fact.teaser}</div>
    <div class="splash-nav">
      <div class="splash-dots">${dotsHTML}</div>
      <button class="splash-skip" onclick="askSplash()">Erzähl mir mehr →</button>
    </div>
  `;

  msgs.insertBefore(card, msgs.firstChild);
  scrollBottom();
}

function goToSplash(i) {
  splashIndex = i;
  renderSplash(i);
}

function askSplash() {
  const fact = SPLASH_FACTS[splashIndex];
  sendMessage(fact.question);
}

function rotateSplash() {
  if (!document.getElementById('splashCard')) return;
  splashIndex = (splashIndex + 1) % SPLASH_FACTS.length;
  renderSplash(splashIndex);
}

// ─────────────────────────────────────────────
// GREETING
// ─────────────────────────────────────────────

async function showGreeting() {
  // Random starting fact
  splashIndex = Math.floor(Math.random() * SPLASH_FACTS.length);

  // Bot greeting
  const typing = showTyping();
  await delay(900);
  removeTyping();
  addMessage(`<strong>Servus. Ich bin METAi.</strong>

Die Stimme der Metall Allianz — und ich hab einiges zu erzählen.

Stell mir eine Frage über Metall, Klimaschutz, Kreislaufwirtschaft oder die Branche.`, 'bot');

  // Then splash
  await delay(200);
  renderSplash(splashIndex);

  // Auto-rotate splash every 12s
  setInterval(rotateSplash, 12000);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
showGreeting();
</script>
</body>
</html>
